<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <title>OG Image Template</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      background-color: #F5F0EB;
      font-family: Georgia, 'Times New Roman', serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px 100px;
      position: relative;
      overflow: hidden;
    }
    .accent-line {
      width: 60px;
      height: 4px;
      background-color: #C4785B;
      margin-bottom: 40px;
    }
    h1 {
      font-size: 64px;
      font-weight: 400;
      color: #2C2825;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 24px;
    }
    p {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 28px;
      color: #6B6360;
      line-height: 1.5;
      max-width: 800px;
    }
    .footer {
      position: absolute;
      bottom: 60px;
      left: 100px;
      right: 100px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .domain {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 20px;
      font-weight: 500;
      color: #B5ADA6;
      letter-spacing: 0.02em;
    }
    .badge {
      background-color: #C4785B;
      color: #F5F0EB;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 16px;
      font-weight: 500;
      padding: 10px 24px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .corner-accent {
      position: absolute;
      top: 0;
      right: 0;
      width: 200px;
      height: 200px;
      background: linear-gradient(135deg, transparent 50%, #EDE6DD 50%);
    }
  </style>
</head>
<body>
  <div class="corner-accent"></div>
  <div class="accent-line"></div>
  <h1>Eddie Miller Agency</h1>
  <p>Visibilité IA &amp; SEO Local pour les commerces parisiens</p>
  <div class="footer">
    <span class="domain">eddiemiller.agency</span>
    <span class="badge">Audit gratuit</span>
  </div>
</body>
</html>
