  <!-- Title -->
  <text x="100" y="250" font-family="Georgia, 'Times New Roman', serif" font-size="68" font-weight="400" fill="#2C2825" letter-spacing="-1">Eddie Miller Agency</text>

  <!-- Subtitle -->
  <text x="100" y="320" font-family="-apple-system, system-ui, 'Segoe UI', sans-serif" font-size="32" fill="#6B6360">Visibilit&#233; IA &amp; SEO Local &#224; Paris</text>

